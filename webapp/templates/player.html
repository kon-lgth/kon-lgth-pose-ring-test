<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PoseRing — Player</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
  <style>
    /* ───────────────── Layout ───────────────── */
    body {
      overflow: hidden;
      background:
        radial-gradient(circle at 18% 76%, rgba(255, 242, 74, 0.14), transparent 17rem),
        radial-gradient(circle at 72% 70%, rgba(66, 199, 255, 0.12), transparent 18rem),
        #fff;
      color: #090909;
    }
    #stars { display: none; }

    .player-wrap {
      position: relative; z-index:1;
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-height: 100vh;
      padding: 1rem 1.5rem 1.4rem;
      gap: 1rem;
      box-sizing: border-box;
    }

    /* ── Header ── */
    .hud-top {
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 0.5rem;
    }
    .game-logo { font-size: clamp(0.75rem, 1.2vw, 1rem); color: #111; letter-spacing: 3px; }
    .round-info { text-align: center; }
    .round-label { font-size: clamp(0.62rem, 1vw, 0.82rem); color: #777; }
    .round-val   { font-size: clamp(1.15rem, 2vw, 1.7rem); color: #111; }

    /* ── Timer ── */
    .timer-block { text-align: right; }
    .timer-label { font-size: clamp(0.62rem, 1vw, 0.82rem); color: #777; }
    .timer-val {
      font-size: clamp(1.55rem, 3vw, 2.4rem); transition: color 0.3s;
    }
    .timer-val.ok      { color: #4ade80; }
    .timer-val.warning { color: #facc15; }
    .timer-val.danger  { color: #ef4444; animation: blink-fast 0.5s step-start infinite; }
    @keyframes blink-fast { 50% { opacity: 0.3; } }

    .turn-banner {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 0.8rem;
      color: var(--turn-color, #2563eb);
      border: 4px solid currentColor;
      border-radius: 999px;
      background: #fff;
      padding: 0.65rem 1.25rem 0.55rem;
      box-shadow: 0 9px 0 rgba(0,0,0,0.10), 0 0 24px color-mix(in srgb, currentColor 35%, transparent);
      text-align: center;
    }

    .turn-banner.show {
      display: flex;
    }

    .turn-dot {
      width: 1rem;
      height: 1rem;
      border-radius: 50%;
      background: currentColor;
      box-shadow: 0 0 18px currentColor;
      flex: 0 0 auto;
    }

    .turn-label {
      font-size: clamp(0.62rem, 1vw, 0.82rem);
      color: #777;
    }

    .turn-name {
      font-size: clamp(1.25rem, 3.4vw, 2.4rem);
      line-height: 1.1;
    }

    /* ── Middle section ── */
    .middle {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 1.5rem;
    }

    /* Status message */
    .status-msg {
      font-size: clamp(1.1rem, 3vw, 2rem);
      text-align: center;
      min-height: 2.5rem;
      transition: color 0.3s;
    }

    /* Hold bar */
    .hold-bar-wrap {
      width: min(600px, 90vw);
      background: #fff;
      border: 3px solid #111;
      height: 32px;
      position: relative;
      overflow: hidden;
    }
    .hold-bar-fill {
      height: 100%;
      background: #111;
      width: 0%;
      transition: width 0.15s linear;
      box-shadow: 0 0 18px rgba(0,0,0,0.22);
    }
    .hold-bar-label {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      font-size: clamp(0.62rem, 1vw, 0.8rem); color: #fff;
      pointer-events: none; letter-spacing: 2px;
    }

    /* Proximity rings — one per color */
    .prox-rings {
      display: flex; gap: clamp(1.4rem, 2.8vw, 2.4rem); flex-wrap: wrap; justify-content: center;
    }
    .prox-card {
      display: flex; flex-direction: column;
      align-items: center; gap: 0.5rem;
    }
    .prox-ring-wrap {
      position: relative; width: 80px; height: 80px;
    }
    .prox-ring-svg { width: 80px; height: 80px; transform: rotate(-90deg); }
    .prox-ring-bg  { fill: none; stroke: #d4d4d4; stroke-width: 8; }
    .prox-ring-arc { fill: none; stroke-width: 8; stroke-linecap: round;
                     stroke-dasharray: 201; stroke-dashoffset: 201;
                     transition: stroke-dashoffset 0.3s ease; }
    .prox-dot {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      width: 18px; height: 18px; border-radius: 50%;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .prox-label { font-size: clamp(0.62rem, 1vw, 0.82rem); letter-spacing: 1px; }

    /* Color-specific */
    .prox-card[data-color="RED"]    .prox-ring-arc { stroke: #ef4444; }
    .prox-card[data-color="RED"]    .prox-dot { background:#ef4444; }
    .prox-card[data-color="RED"]    .prox-label { color:#ef4444; }
    .prox-card[data-color="YELLOW"] .prox-ring-arc { stroke: #facc15; }
    .prox-card[data-color="YELLOW"] .prox-dot { background:#facc15; }
    .prox-card[data-color="YELLOW"] .prox-label { color:#facc15; }
    .prox-card[data-color="BLUE"]   .prox-ring-arc { stroke: #60a5fa; }
    .prox-card[data-color="BLUE"]   .prox-dot { background:#60a5fa; }
    .prox-card[data-color="BLUE"]   .prox-label { color:#60a5fa; }
    .prox-card[data-color="GREEN"]  .prox-ring-arc { stroke: #4ade80; }
    .prox-card[data-color="GREEN"]  .prox-dot { background:#4ade80; }
    .prox-card[data-color="GREEN"]  .prox-label { color:#4ade80; }

    /* Pulsing animation when inside target */
    .prox-dot.inside {
      animation: dot-pulse 0.6s ease-in-out infinite;
    }
    @keyframes dot-pulse {
      0%,100% { transform: translate(-50%,-50%) scale(1); box-shadow: none; }
      50%      { transform: translate(-50%,-50%) scale(1.5); box-shadow: 0 0 12px currentColor; }
    }

    /* ── Score cards ── */
    .scores-row {
      display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center;
    }
    .score-card {
      background: #fff; border: 3px solid #111; border-radius: 20px;
      padding: 0.95rem 1.3rem; min-width: 150px; text-align: center;
      position: relative; transition: border-color 0.3s;
      box-shadow: 0 8px 0 rgba(0,0,0,0.10);
    }
    .score-card.top-score { border-color: #111; background: #f8f8f8; }
    .score-name  { font-size: clamp(0.62rem, 1vw, 0.82rem); color: #777; margin-bottom: 0.65rem; line-height: 1.3; }
    .score-value { font-size: clamp(1.25rem, 2.4vw, 2rem); color: #111; }
    .score-card.active-turn {
      border-color: var(--player-color, #111);
      box-shadow: 0 8px 0 rgba(0,0,0,0.10), 0 0 20px color-mix(in srgb, var(--player-color, #111) 35%, transparent);
    }
    .score-card.active-turn .score-name {
      color: var(--player-color, #111);
    }
    .score-crown { position: absolute; top: -14px; left: 50%; transform: translateX(-50%); font-size: 1rem; }

    /* ── Pose progress pips ── */
    .pose-pips { display: flex; gap: 10px; }
    .pip {
      width: 18px; height: 18px; border-radius: 3px;
      border: 3px solid #111; background: #fff;
      transition: background 0.3s;
    }
    .pip.done { background: #111; border-color: #111; }

    /* ════════════════════════════════════════════
       COUNTDOWN OVERLAY  (3-2-1-GO)
       Sits above everything, full screen
       ════════════════════════════════════════════ */
    #overlay-countdown {
      display: none; position: fixed; inset: 0; z-index: 100;
      align-items: center; justify-content: center;
      background: rgba(0,0,0,0.82);
      flex-direction: column; gap: 0.5rem;
    }
    #overlay-countdown.show { display: flex; }
    .countdown-number {
      font-size: clamp(4rem, 20vw, 10rem);
      animation: countdown-pop 0.4s cubic-bezier(0.34,1.56,0.64,1) forwards;
      text-shadow: 0 0 40px currentColor;
    }
    .countdown-sub {
      font-size: 0.7rem; letter-spacing: 4px; color: #94a3b8;
    }
    @keyframes countdown-pop {
      from { transform: scale(2); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }
    @keyframes go-flash {
      0%,100% { opacity: 1; }
      50%      { opacity: 0.6; }
    }
    .countdown-go { animation: go-flash 0.25s ease 4; }

    /* ════════════════════════════════════════════
       RESULT OVERLAY  (POSE CLEAR / TIME'S UP)
       Shows snapshot photos + NEXT button
       ════════════════════════════════════════════ */
    #overlay-result {
      display: none; position: fixed; inset: 0; z-index: 80;
      align-items: center; justify-content: center;
      background: rgba(0,0,0,0.88);
      flex-direction: column; gap: 1.2rem;
      overflow-y: auto; padding: 1rem;
    }
    #overlay-result.show { display: flex; }

    .result-title {
      font-size: clamp(1.4rem, 6vw, 3rem);
      text-align: center;
      animation: zoom-in 0.4s cubic-bezier(0.34,1.56,0.64,1) forwards;
    }
    .result-sub {
      font-size: 0.55rem; color: #94a3b8; letter-spacing: 2px; text-align: center;
    }

    /* Snapshot photos */
    .snapshot-row {
      display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center;
    }
    .snapshot-frame {
      border: 3px solid #312e81;
      background: #0f0e2a;
      position: relative;
      max-width: min(340px, 44vw);
    }
    .snapshot-frame img {
      display: block; width: 100%; height: auto;
    }
    .snapshot-label {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: rgba(0,0,0,0.65);
      font-size: 0.35rem; color: #94a3b8;
      padding: 4px 6px; text-align: center;
    }
    .snapshot-placeholder {
      width: 280px; height: 160px;
      display: flex; align-items: center; justify-content: center;
      color: #374151; font-size: 0.4rem;
    }

    /* Next button */
    .next-btn {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.7rem;
      background: transparent;
      color: #a78bfa;
      border: 3px solid #a78bfa;
      padding: 0.8rem 2.5rem;
      cursor: pointer;
      letter-spacing: 2px;
      transition: all 0.15s;
      animation: neon-pulse 2s ease-in-out infinite;
    }
    .next-btn:hover { background: #a78bfa; color: #000; }
    .next-btn:active { transform: scale(0.97); }

    /* ════════════════════════════════════════════
       END OVERLAY  (GAME OVER / GAME CLEAR)
       ════════════════════════════════════════════ */
    #overlay-end {
      display: none; position: fixed; inset: 0; z-index: 80;
      align-items: center; justify-content: center;
      background: rgba(0,0,0,0.90);
      flex-direction: column; gap: 1.2rem;
      padding: 2rem;
    }
    #overlay-end.show { display: flex; }

    .end-title {
      font-size: clamp(1.6rem, 7vw, 3.5rem);
      text-align: center;
      animation: zoom-in 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards;
    }
    .end-sub {
      font-size: 0.6rem; color: #94a3b8; letter-spacing: 2px; text-align: center;
    }
    .end-scores {
      font-size: 0.55rem; color: #c4b5fd; text-align: center;
      line-height: 2.2; white-space: pre-line;
    }

    /* Stars decoration for GAME CLEAR */
    .star-burst {
      font-size: 2rem;
      animation: spin-slow 3s linear infinite;
    }
    @keyframes spin-slow { to { transform: rotate(360deg); } }

    /* ── Shared zoom-in animation ── */
    @keyframes zoom-in {
      from { transform: scale(0.4); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    /* Audio unlock */
    #audioUnlock {
      position: fixed; inset: 0; z-index: 240;
      display: flex; align-items: center; justify-content: center;
      background:
        radial-gradient(circle at 18% 76%, rgba(255, 242, 74, 0.16), transparent 17rem),
        radial-gradient(circle at 72% 70%, rgba(66, 199, 255, 0.14), transparent 18rem),
        rgba(255,255,255,0.88);
      backdrop-filter: blur(6px);
    }
    body.audio-ready #audioUnlock { display: none; }
    .audio-unlock-panel {
      border: 4px solid #111;
      border-radius: 34px;
      background: #fff;
      padding: clamp(1.25rem, 3vw, 2rem);
      text-align: center;
      max-width: min(620px, 88vw);
      box-shadow: 0 14px 0 rgba(0,0,0,0.14), 0 24px 34px rgba(0,0,0,0.12);
    }
    .audio-unlock-title {
      font-size: clamp(0.85rem, 2.2vw, 1.35rem);
      color: #111;
      margin-bottom: 1rem;
      line-height: 1.5;
    }
    .audio-unlock-text {
      font-size: clamp(0.5rem, 1vw, 0.72rem);
      color: #777;
      line-height: 1.9;
      margin-bottom: 1.2rem;
    }
    .sound-btn {
      z-index: 250;
      background: #111;
      border: 0;
      border-radius: 999px;
      color: #fff;
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(0.55rem, 1.1vw, 0.75rem);
      line-height: 1.4;
      padding: 0.85rem 1.35rem 0.75rem;
      cursor: pointer;
      box-shadow: 0 8px 0 #000, 0 14px 20px rgba(0,0,0,0.14);
      transition: transform 0.16s ease, box-shadow 0.16s ease;
    }
    .sound-btn:hover {
      transform: translateY(3px);
      box-shadow: 0 5px 0 #000, 0 10px 16px rgba(0,0,0,0.12);
    }
    .sound-btn:active {
      transform: translateY(7px);
      box-shadow: 0 2px 0 #000, 0 6px 10px rgba(0,0,0,0.10);
    }
    html[lang="ja"] .audio-unlock-title,
    html[lang="ja"] .audio-unlock-text,
    html[lang="ja"] .sound-btn {
      font-family: 'DotGothic16', 'Press Start 2P', monospace;
    }
    html[lang="ja"] .audio-unlock-title {
      font-size: clamp(1.35rem, 3vw, 2rem);
    }
    html[lang="ja"] .audio-unlock-text,
    html[lang="ja"] .sound-btn {
      font-size: clamp(1rem, 1.7vw, 1.25rem);
    }
  </style>
</head>
<body>
  <canvas id="stars"></canvas>

  <div class="player-wrap">

    <!-- Header -->
    <div class="hud-top">
      <div class="game-logo">POSERING</div>

      <div class="round-info">
        <div class="round-label">ROUND</div>
        <div class="round-val" id="roundDisplay">1 / 3</div>
        <div class="pose-pips" id="posePips" style="margin-top:6px; justify-content:center;"></div>
      </div>

      <div class="timer-block">
        <div class="timer-label">TIME</div>
        <div class="timer-val ok" id="timerDisplay">45</div>
      </div>
    </div>

    <!-- Middle -->
    <div class="middle">

      <div class="status-msg" id="statusMsg" style="color:#111;">
        Waiting for game…
      </div>

      <div class="turn-banner" id="turnBanner">
        <span class="turn-dot"></span>
        <div>
          <div class="turn-label">CURRENT PLAYER</div>
          <div class="turn-name" id="turnName">Player 1</div>
        </div>
      </div>

      <!-- Hold progress bar -->
      <div class="hold-bar-wrap" id="holdBarWrap" style="display:none;">
        <div class="hold-bar-fill" id="holdBarFill"></div>
        <div class="hold-bar-label">HOLD THE POSE!</div>
      </div>

      <!-- Proximity rings -->
      <div class="prox-rings" id="proxRings">
        <!-- Built by JS -->
      </div>

      <!-- Scores -->
      <div class="scores-row" id="scoresRow"></div>
    </div>

    <!-- Footer spacer -->
    <div></div>

  </div>

  <!-- ═══ COUNTDOWN OVERLAY (3-2-1-GO!) ═══ -->
  <div id="overlay-countdown">
    <div class="countdown-number glow-purple" id="cdNumber">3</div>
    <div class="countdown-sub" id="cdSub">GET READY!</div>
  </div>

  <!-- ═══ RESULT OVERLAY (POSE CLEAR / TIME'S UP) ═══ -->
  <div id="overlay-result">
    <div class="result-title" id="resultTitle">POSE CLEAR!</div>
    <div class="result-sub"  id="resultSub"></div>

    <!-- Camera snapshots -->
    <div class="snapshot-row" id="snapshotRow">
      <!-- Populated by JS when snapshot_event arrives -->
    </div>

    <button class="next-btn" id="nextBtn" onclick="sendNextPose()">
      ▶ NEXT POSE
    </button>
  </div>

  <!-- ═══ END OVERLAY (GAME OVER / GAME CLEAR) ═══ -->
  <div id="overlay-end">
    <div class="star-burst" id="endStar" style="display:none;">✨</div>
    <div class="end-title" id="endTitle">GAME OVER!</div>
    <div class="end-sub"   id="endSub"></div>
    <div class="end-scores" id="endScores"></div>
  </div>

  <!-- Required by browser autoplay policy. Operator controls the actual volumes. -->
  <div id="audioUnlock">
    <div class="audio-unlock-panel">
      <div class="audio-unlock-title" data-player-i18n="audioTitle">PLAYER AUDIO</div>
      <div class="audio-unlock-text" data-player-i18n="audioText">
        Tap once on this display to enable countdown, music, and game effects.
        Volume is controlled from the operator screen.
      </div>
      <button class="sound-btn" id="soundBtn" onclick="enablePlayerAudio()" data-player-i18n="audioButton">ENABLE AUDIO</button>
    </div>
  </div>

  <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
  <script>
    window.POSERING_PLAYER_TEXT = {
      en: {
        audioTitle: 'PLAYER AUDIO',
        audioText: 'Tap once on this display to enable countdown, music, and game effects. Volume is controlled from the operator screen.',
        audioButton: 'ENABLE AUDIO',
        audioReady: 'AUDIO READY',
      },
      ja: {
        audioTitle: 'プレイヤー音声',
        audioText: 'カウントダウン、BGM、効果音を有効にするために一度タップしてください。音量はオペレーター画面で調整します。',
        audioButton: '音声を有効にする',
        audioReady: '音声 OK',
      },
    };
    (function applyPlayerLanguage() {
      const lang = localStorage.getItem('poseringLanguage') === 'en' ? 'en' : 'ja';
      document.documentElement.lang = lang;
      const table = window.POSERING_PLAYER_TEXT[lang] || window.POSERING_PLAYER_TEXT.ja;
      document.querySelectorAll('[data-player-i18n]').forEach((el) => {
        const key = el.dataset.playerI18n;
        if (table[key]) el.textContent = table[key];
      });
    })();
  </script>
  <script src="/static/js/player.js"></script>
</body>
</html>
